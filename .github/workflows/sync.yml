name: Sync Fork

on:
  schedule:
    # Run every 6 hours (check for updates 4 times a day)
    - cron: '0 */6 * * *' 
  workflow_dispatch: # Allows you to run this manually if you're impatient

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v3

      - name: Sync with Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_sync_branch: main
          # REPLACE 'upstream_repository' WITH YOUR FRIEND'S REPO (e.g., her-username/repo-name)
          upstream_sync_repo: her-username/project-name
          upstream_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false
